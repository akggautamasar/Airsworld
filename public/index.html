<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Air's World</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<canvas id="grid"></canvas>
<input id="mobileInput" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />

<div id="toolbar">
  <label>Color <input type="color" id="colorPicker" value="#111111" /></label>
  <label><input type="checkbox" id="eraserToggle" /> Eraser</label>
  <label><input type="checkbox" id="coordsToggle" /> Show coordinates</label>
</div>
<div id="coords"></div>

<div id="hint">Tap/click a cell, then type. Drag to pan. Turn on Eraser to tap/drag-delete text.</div>
<script src="/client.js"></script>
</body>
</html>
